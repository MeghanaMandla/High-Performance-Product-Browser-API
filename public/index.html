<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog — 200,000 products</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Three.js renders here (fixed, z-index 0) -->
  <canvas id="bg"></canvas>

  <!-- All UI sits above the canvas -->
  <div class="overlay">
    <header class="site-header" id="siteHeader">
      <div class="header-inner">
        <div>
          <p class="header-eyebrow">Catalog</p>
          <h1 class="header-title">200,000 products</h1>
        </div>
        <div>
          <select id="categorySelect" class="category-select">
            <option value="">All categories</option>
          </select>
        </div>
      </div>
    </header>

    <main class="site-main">
      <p class="status-line" id="statusLine">Initializing…</p>
      <div id="grid" class="product-grid"></div>
      <div class="load-more-wrap">
        <button id="loadMoreBtn" class="load-more-btn">Load more</button>
      </div>
      <div id="sentinel" style="height:1px"></div>
    </main>
  </div>

  <!-- Three.js r128 (global THREE) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <!-- GSAP 3 (global gsap) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
  /* ================================================================
     THREE.JS — interactive particle network background
     ================================================================ */
  (function initThree() {
    const canvas   = document.getElementById('bg');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 10;

    /* ---- particles ---- */
    const COUNT     = 1500;
    const positions = new Float32Array(COUNT * 3);
    const colors    = new Float32Array(COUNT * 3);

    for (let i = 0; i < COUNT; i++) {
      positions[i*3]   = (Math.random() - 0.5) * 22;
      positions[i*3+1] = (Math.random() - 0.5) * 22;
      positions[i*3+2] = (Math.random() - 0.5) * 22;
      // 70 % cyan  /  30 % violet
      if (Math.random() < 0.7) {
        colors[i*3] = 0.0; colors[i*3+1] = 0.83; colors[i*3+2] = 1.0;
      } else {
        colors[i*3] = 0.66; colors[i*3+1] = 0.33; colors[i*3+2] = 0.97;
      }
    }

    const ptGeo = new THREE.BufferGeometry();
    ptGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    ptGeo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));

    const ptMat = new THREE.PointsMaterial({
      size: 0.07,
      vertexColors: true,
      transparent: true,
      opacity: 0.75,
      sizeAttenuation: true,
    });

    const pts = new THREE.Points(ptGeo, ptMat);
    scene.add(pts);

    /* ---- connecting lines (computed once, added after first frame) ----
       O(n²) distance check over 1500 points runs ~100 ms; deferred to
       requestIdleCallback so it never blocks the first render.            */
    const lineMat = new THREE.LineBasicMaterial({
      color: 0x00d4ff,
      transparent: true,
      opacity: 0.07,
    });

    function buildLines() {
      const LINK_SQ = 2.6 * 2.6;
      const verts   = [];
      for (let i = 0; i < COUNT; i++) {
        for (let j = i + 1; j < COUNT; j++) {
          const dx = positions[i*3]   - positions[j*3];
          const dy = positions[i*3+1] - positions[j*3+1];
          const dz = positions[i*3+2] - positions[j*3+2];
          if (dx*dx + dy*dy + dz*dz < LINK_SQ) {
            verts.push(
              positions[i*3], positions[i*3+1], positions[i*3+2],
              positions[j*3], positions[j*3+1], positions[j*3+2]
            );
          }
        }
      }
      const lineGeo = new THREE.BufferGeometry();
      lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
      const lines = new THREE.LineSegments(lineGeo, lineMat);
      scene.add(lines);
      // Keep lines in sync with particle rotation
      pts.userData.lines = lines;
    }

    (window.requestIdleCallback || (fn => setTimeout(fn, 100)))(buildLines);

    /* ---- mouse → camera parallax ---- */
    let targetX = 0, targetY = 0;
    window.addEventListener('mousemove', (e) => {
      targetX =  (e.clientX / window.innerWidth  - 0.5) * 1.2;
      targetY = -(e.clientY / window.innerHeight - 0.5) * 1.2;
    });

    /* ---- raycaster: highlight particles near cursor ---- */
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points = { threshold: 0.8 };
    const mouse2d = new THREE.Vector2();
    const origColors = new Float32Array(colors); // save originals

    window.addEventListener('mousemove', (e) => {
      mouse2d.x =  (e.clientX / window.innerWidth)  * 2 - 1;
      mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    let highlightFrame = 0;
    function updateHighlight() {
      // Only run every 4 frames for performance
      if (++highlightFrame % 4 !== 0) return;

      raycaster.setFromCamera(mouse2d, camera);
      const hits = raycaster.intersectObject(pts);

      const colorAttr = ptGeo.attributes.color;
      // Restore original colors
      for (let i = 0; i < COUNT; i++) {
        colorAttr.setXYZ(i, origColors[i*3], origColors[i*3+1], origColors[i*3+2]);
      }
      // Brighten particles near the hit
      if (hits.length > 0) {
        const center = hits[0].index;
        const R = 80; // how many index-neighbors to brighten
        for (let k = Math.max(0, center - R); k < Math.min(COUNT, center + R); k++) {
          colorAttr.setXYZ(k, 0.6, 1.0, 1.0);
        }
      }
      colorAttr.needsUpdate = true;
    }

    /* ---- resize ---- */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ---- animation loop ---- */
    (function loop() {
      requestAnimationFrame(loop);

      pts.rotation.y += 0.0007;
      pts.rotation.x += 0.0002;

      if (pts.userData.lines) {
        pts.userData.lines.rotation.y = pts.rotation.y;
        pts.userData.lines.rotation.x = pts.rotation.x;
      }

      // Smooth camera drift toward mouse
      camera.position.x += (targetX * 0.4 - camera.position.x) * 0.025;
      camera.position.y += (targetY * 0.4 - camera.position.y) * 0.025;
      camera.lookAt(0, 0, 0);

      updateHighlight();
      renderer.render(scene, camera);
    })();
  })();


  /* ================================================================
     PRODUCT CATALOG — fetch, render, paginate with GSAP animations
     ================================================================ */
  (function initApp() {
    'use strict';

    const grid        = document.getElementById('grid');
    const statusLine  = document.getElementById('statusLine');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const catSelect   = document.getElementById('categorySelect');

    const PAGE_SIZE = 24;
    let nextCursor  = null;
    let loading     = false;
    let exhausted   = false;
    let currentCat  = '';
    let total       = 0;

    function fmtPrice(p) {
      return '$' + Number(p).toFixed(2);
    }
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
      });
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function makeCard(p) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <span class="card-category">${esc(p.category)}</span>
        <h3 class="card-name">${esc(p.name)}</h3>
        <div class="card-footer">
          <span class="card-price">${fmtPrice(p.price)}</span>
          <span class="card-date">${fmtDate(p.created_at)}</span>
        </div>
        <span class="card-id">#${p.id}</span>
      `;
      // GSAP hover — lift + cyan glow
      el.addEventListener('mouseenter', () =>
        gsap.to(el, {
          y: -7, scale: 1.025,
          boxShadow: '0 0 32px rgba(0,212,255,0.28), 0 10px 36px rgba(0,0,0,0.55)',
          duration: 0.22, ease: 'power2.out',
        })
      );
      el.addEventListener('mouseleave', () =>
        gsap.to(el, {
          y: 0, scale: 1,
          boxShadow: '0 2px 16px rgba(0,0,0,0.3)',
          duration: 0.3, ease: 'power2.out',
        })
      );
      return el;
    }

    async function fetchPage() {
      if (loading || exhausted) return;
      loading = true;
      loadMoreBtn.disabled = true;
      statusLine.textContent = `Loading… (${total.toLocaleString()} shown)`;

      const params = new URLSearchParams({ limit: String(PAGE_SIZE) });
      if (currentCat)  params.set('category',    currentCat);
      if (nextCursor)  params.set('next_cursor',  nextCursor);

      try {
        const res  = await fetch('/api/products?' + params);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const cards = data.data.map(makeCard);
        cards.forEach(c => grid.appendChild(c));

        // GSAP staggered fade-in + slide-up
        gsap.fromTo(cards,
          { opacity: 0, y: 32 },
          { opacity: 1, y: 0, duration: 0.5, stagger: 0.04, ease: 'power2.out' }
        );

        total     += data.data.length;
        nextCursor = data.next_cursor;
        exhausted  = !data.has_more;

        loadMoreBtn.classList.toggle('hidden', exhausted);
        statusLine.textContent = exhausted
          ? `${total.toLocaleString()} products — end of catalog`
          : `${total.toLocaleString()} products shown`;

      } catch (err) {
        statusLine.textContent = 'Failed to load: ' + err.message;
      } finally {
        loading = false;
        loadMoreBtn.disabled = false;
      }
    }

    function resetAndLoad() {
      const existing = Array.from(grid.children);
      if (existing.length) {
        // GSAP scale-down old cards before clearing
        gsap.to(existing, {
          scale: 0.88, opacity: 0, duration: 0.18, stagger: 0.008, ease: 'power1.in',
          onComplete() {
            grid.innerHTML = '';
            nextCursor = null;
            exhausted  = false;
            total      = 0;
            loadMoreBtn.classList.remove('hidden');
            fetchPage();
          },
        });
      } else {
        nextCursor = null;
        exhausted  = false;
        total      = 0;
        loadMoreBtn.classList.remove('hidden');
        fetchPage();
      }
    }

    loadMoreBtn.addEventListener('click', fetchPage);
    catSelect.addEventListener('change', () => {
      currentCat = catSelect.value;
      resetAndLoad();
    });

    // Infinite scroll sentinel
    new IntersectionObserver(
      (entries) => { if (entries[0].isIntersecting) fetchPage(); },
      { rootMargin: '600px' }
    ).observe(document.getElementById('sentinel'));

    // Populate category dropdown
    fetch('/api/categories')
      .then(r => r.json())
      .then(d => {
        d.categories.forEach(c => {
          const opt = document.createElement('option');
          opt.value = opt.textContent = c;
          catSelect.appendChild(opt);
        });
      })
      .catch(console.error);

    // Header slides in on load
    gsap.from('#siteHeader', { y: -50, opacity: 0, duration: 0.9, ease: 'power3.out' });

    fetchPage();
  })();
  </script>
</body>
</html>
